server:
  port: 8083

spring:
  application:
    name: trade-service

  datasource:
    url: jdbc:postgresql://localhost:5433/sharebazaar
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # since you created tables manually
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka