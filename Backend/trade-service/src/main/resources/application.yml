server:
  port: 8083

spring:
  application:
    name: trade-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sharebazaar
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

portfolio:
  service:
    url: http://localhost:8084